<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayrox - Panel Colaborador</title>
  <link rel="stylesheet" href="collab.css">
</head>
<body>
  <header>
    <h1>Panel del Colaborador</h1>
    <nav>
      <ul>
        <li><a href="collab_dashboard.html">Inicio</a></li>
        <li><a href="config.html">Configuración</a></li>
        <li><a href="index.html">Cerrar sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Proyectos asignados -->
    <section id="projects">
      <h2>Proyectos asignados</h2>
      <ul id="project-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>

    <!-- Tareas asignadas -->
    <section id="tasks">
      <h2>Tareas asignadas</h2>
      <ul id="task-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>

    <!-- Entregar avances -->
    <section id="progress">
      <h2>Entregar avances</h2>
      <form id="progressForm">
        <label for="taskId">ID de tarea</label>
        <input type="text" id="taskId" name="taskId" required>

        <label for="progressText">Avance</label>
        <textarea id="progressText" name="progressText" required></textarea>

        <button type="submit">Enviar avance</button>
      </form>
      <p id="progress-message"></p>
    </section>

    <!-- Notificaciones -->
    <section id="notifications">
      <h2>Notificaciones</h2>
      <ul id="notification-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

  <!-- Configuración Firebase -->
  <script src="firebase.js"></script>
  <!-- Lógica de colaborador -->
  <script src="collaborators.js"></script>
  <script src="tasks.js"></script>
</body>
</html>
