<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayrox - Panel Administrador</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header>
    <h1>Panel del Administrador</h1>
    <nav>
      <ul>
        <li><a href="admin_dashboard.html">Inicio</a></li>
        <li><a href="config.html">Configuración</a></li>
        <li><a href="index.html">Cerrar sesión</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Gestión de proyectos -->
    <section id="projects">
      <h2>Gestión de Proyectos</h2>
      <button id="addProjectBtn">Agregar Proyecto</button>
      <ul id="project-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>

    <!-- Gestión de colaboradores -->
    <section id="collaborators">
      <h2>Gestión de Colaboradores</h2>
      <button id="addCollabBtn">Dar de alta colaborador</button>
      <ul id="collab-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>

    <!-- Gestión de tareas -->
    <section id="tasks">
      <h2>Gestión de Tareas</h2>
      <button id="assignTaskBtn">Asignar Tarea</button>
      <ul id="task-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>

    <!-- Reportes -->
    <section id="reports">
      <h2>Reportes de Proyectos</h2>
      <ul id="report-list">
        <!-- Se llenará dinámicamente desde Firebase -->
      </ul>
    </section>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

  <!-- Configuración Firebase -->
  <script src="firebase.js"></script>
  <!-- Lógica de administrador -->
  <script src="projects.js"></script>
  <script src="collaborators.js"></script>
  <script src="tasks.js"></script>
  <script src="reports.js"></script>
</body>
</html>
