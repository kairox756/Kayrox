<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Dashboard Kayrox</title>
  <link rel="stylesheet" href="styles.css"> <!-- Tu CSS externo -->
  <!-- SDK de Firebase -->
  <script type="module">
    // Importar Firebase desde CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Configuración de tu proyecto Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "kayrox.firebaseapp.com",
      projectId: "kayrox",
      storageBucket: "kayrox.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef123456"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Función de login
    window.loginKayrox = function(event) {
      event.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("loginMessage");

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          message.textContent = "Acceso concedido. Bienvenido al Dashboard.";
          message.className = "estado vigente";
          // Redirigir al dashboard
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          message.textContent = "Credenciales incorrectas o usuario no registrado.";
          message.className = "estado finalizado";
        });
    }
  </script>
</head>
<body>
  <header>
    <h1>Kayrox Software</h1>
    <nav>
      <a href="inicio.html">Inicio</a>
      <a href="convocatoriadereclutamiento.html">Convocatoria</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <div class="hero">
    <h2>Acceso al Dashboard</h2>
    <p>Inicia sesión para gestionar tu participación</p>
  </div>

  <section id="login">
    <div class="container">
      <div class="card">
        <h3>Iniciar sesión</h3>
        <form onsubmit="loginKayrox(event)">
          <label for="email">Correo electrónico</label><br>
          <input type="email" id="email" name="email" required><br><br>

          <label for="password">Contraseña</label><br>
          <input type="password" id="password" name="password" required><br><br>

          <button type="submit" class="btn">Entrar</button>
        </form>
        <p id="loginMessage" class="estado"></p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 Kayrox Software – Proyecto colaborativo
  </footer>
</body>
</html>
